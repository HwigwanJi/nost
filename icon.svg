<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d20"/>
      <stop offset="100%" stop-color="#16103a"/>
    </linearGradient>
    <linearGradient id="letter" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.39
                0 0 0 0 0.40
                0 0 0 0 0.95
                0 0 0 0.45 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle inner highlight at top -->
    <radialGradient id="highlight" cx="50%" cy="0%" r="70%" fx="50%" fy="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Subtle top highlight -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#highlight)"/>

  <!-- "n" letterform — geometric, bold -->
  <path d="
    M 116 418
    L 116 196
    Q 116 88 256 88
    Q 396 88 396 196
    L 396 418
    L 326 418
    L 326 212
    Q 326 158 256 158
    Q 186 158 186 212
    L 186 418
    Z
  " fill="url(#letter)" filter="url(#glow)"/>
</svg>
