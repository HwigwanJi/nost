<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background rounded square -->
  <rect width="128" height="128" rx="28" fill="#7c3aed"/>
  <!-- Rocket body -->
  <ellipse cx="64" cy="58" rx="18" ry="28" fill="white"/>
  <!-- Rocket nose -->
  <ellipse cx="64" cy="32" rx="18" ry="14" fill="#ede9fe"/>
  <!-- Left fin -->
  <polygon points="46,80 36,100 54,88" fill="#ddd6fe"/>
  <!-- Right fin -->
  <polygon points="82,80 92,100 74,88" fill="#ddd6fe"/>
  <!-- Flame -->
  <ellipse cx="64" cy="100" rx="9" ry="12" fill="#fbbf24"/>
  <ellipse cx="64" cy="105" rx="5" ry="7" fill="#f97316"/>
  <!-- Window -->
  <circle cx="64" cy="56" r="7" fill="#7c3aed"/>
  <circle cx="64" cy="56" r="4" fill="#a78bfa"/>
</svg>
