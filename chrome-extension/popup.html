<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nost Bridge</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 220px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 16px;
      user-select: none;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .header .icon {
      font-size: 22px;
      line-height: 1;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #cba6f7;
      white-space: nowrap;
    }

    .divider {
      height: 1px;
      background: #313244;
      margin-bottom: 14px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .row:last-child {
      margin-bottom: 0;
    }

    .label {
      font-size: 12px;
      color: #a6adc8;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.connected {
      background: #a6e3a1;
      box-shadow: 0 0 6px #a6e3a1;
    }

    .dot.disconnected {
      background: #f38ba8;
      box-shadow: 0 0 6px #f38ba8;
    }

    .status-text.connected {
      color: #a6e3a1;
    }

    .status-text.disconnected {
      color: #f38ba8;
    }

    .tab-count {
      font-size: 13px;
      font-weight: 600;
      color: #89b4fa;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="icon">🚀</span>
    <h1>nost Bridge</h1>
  </div>

  <div class="divider"></div>

  <div class="row">
    <span class="label">서버 연결</span>
    <div class="status-badge">
      <div class="dot disconnected" id="status-dot"></div>
      <span class="status-text disconnected" id="status-text">연결 안됨</span>
    </div>
  </div>

  <div class="row">
    <span class="label">전송 중인 탭</span>
    <span class="tab-count" id="tab-count">0개 탭</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
