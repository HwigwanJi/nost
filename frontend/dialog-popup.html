<!doctype html>
<html lang="ko" class="dark">
  <head>
    <meta charset="UTF-8" />
    <title>nost dialog popup</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: transparent !important;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        -webkit-app-region: no-drag;
        user-select: none;
        cursor: default;
        font-family: 'Pretendard Variable', Pretendard, -apple-system, 'Noto Sans KR', sans-serif;
        font-feature-settings: 'ss18';
        color: rgba(255, 255, 255, 0.92);
      }
      /* Light mode override — popup auto-adapts to OS preference. */
      @media (prefers-color-scheme: light) {
        html, body { color: rgba(0, 0, 0, 0.85); }
      }
      .ms-rounded {
        font-family: 'Material Symbols Rounded Variable', 'Material Symbols Rounded', 'Material Symbols Outlined';
        font-weight: 500;
        font-style: normal;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: 'liga';
        font-feature-settings: 'liga';
        -webkit-font-smoothing: antialiased;
        font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
      }
      #popup-root {
        position: absolute;
        inset: 0;
        display: flex;
        /* Chip strip is anchored to the BOTTOM of the window. When the preset
           dropdown opens, main grows the window upward — anchoring to the
           bottom means the chip strip stays at the same screen Y throughout,
           and the new empty space at the top is where the dropdown floats. */
        align-items: flex-end;
        padding-bottom: 6px;
      }
    </style>
  </head>
  <body>
    <div id="popup-root"></div>
    <script type="module" src="/src/dialog-popup/index.tsx"></script>
  </body>
</html>
