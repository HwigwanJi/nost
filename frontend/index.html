<!doctype html>
<html lang="ko" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nost</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Fonts loaded locally via npm packages (no CDN requests) -->
    <style>
      html, body { margin: 0; padding: 0; background: transparent !important; overflow: hidden; }

      /* ── Loading screen ────────────────────────────────────── */
      #ql-loading {
        position: fixed;
        inset: 6px;
        border-radius: 14px;
        background: rgba(5, 5, 8, 0.97);
        border: 1px solid rgba(255, 255, 255, 0.07);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 99999;
        -webkit-app-region: drag;
        transition: opacity 0.25s ease;
        user-select: none;
      }
      #ql-loading.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .ql-loading-logo {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: rgba(99, 102, 241, 0.12);
        border: 1px solid rgba(99, 102, 241, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-app-region: no-drag;
      }

      .ql-loading-text {
        font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 0.02em;
      }

      /* Progress bar */
      .ql-progress-wrap {
        width: 120px;
        height: 2px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 99px;
        overflow: hidden;
      }
      #ql-loading-bar {
        height: 100%;
        width: 0%;
        background: rgba(99, 102, 241, 0.7);
        border-radius: 99px;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        animation: ql-bar-init 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes ql-bar-init {
        from { width: 0% }
        to   { width: 35% }
      }

      /* Spinner */
      .ql-spinner {
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255,255,255,0.06);
        border-top-color: rgba(99, 102, 241, 0.7);
        border-radius: 50%;
        animation: ql-spin 0.8s linear infinite;
        display: none;
      }
      @keyframes ql-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Loading screen: visible before React loads, draggable -->
    <div id="ql-loading">
      <div class="ql-loading-logo">
        <svg width="22" height="22" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M 116 418 L 116 196 Q 116 88 256 88 Q 396 88 396 196 L 396 418 L 326 418 L 326 212 Q 326 158 256 158 Q 186 158 186 212 L 186 418 Z" fill="rgba(99, 102, 241, 0.9)"/>
        </svg>
      </div>
      <div class="ql-progress-wrap">
        <div id="ql-loading-bar"></div>
      </div>
      <div class="ql-loading-text">불러오는 중...</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
